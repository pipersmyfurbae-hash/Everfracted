<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Evercrafted Engine</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --cream:#F9F7F3;
  --white:#FDFCFA;
  --parch:#EAE4DA;
  --parch-d:#D5CCBE;
  --sage:#5C7353;
  --sage-l:#D8E3D4;
  --sage-ll:#EEF3EC;
  --sage-d:#3A4D35;
  --bark:#8C7258;
  --bark-l:#C4AD96;
  --bark-ll:#F0EAE2;
  --bark-d:#5C4A36;
  --ink:#1E1C18;
  --ink-2:#3A3730;
  --muted:#847B70;
  --muted-l:#B5AFA8;
  --rule:rgba(30,28,24,0.08);
  --rule-m:rgba(30,28,24,0.14);
  --r:4px;--rl:8px;--rxl:14px
}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--ink);font-size:13px;line-height:1.5}
a{text-decoration:none;color:inherit}
.nav{position:fixed;top:0;left:0;right:0;z-index:300;height:52px;display:flex;align-items:center;background:rgba(249,247,243,0.97);backdrop-filter:blur(16px);border-bottom:1px solid var(--rule);padding:0 20px;gap:0}
.nav-mark{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:500;letter-spacing:0.06em;color:var(--ink);display:flex;align-items:center;gap:7px;flex-shrink:0;text-decoration:none}
.nav-sep{width:1px;height:16px;background:var(--rule-m);margin:0 16px}
.nav-links{display:flex;gap:14px;font-size:12px;color:var(--muted)}
.nav-links a{padding:6px 8px;border-radius:999px}
.nav-links a:hover{color:var(--ink)}
.nav-r{margin-left:auto;display:flex;align-items:center;gap:8px}
.btn-ghost{background:none;border:none;font-size:12px;color:var(--muted);cursor:pointer;font-family:'DM Sans',sans-serif;letter-spacing:.03em;padding:6px 8px}
.btn-ghost:hover{color:var(--ink)}
.btn-cta{padding:7px 18px;background:var(--ink);color:var(--white);border:none;border-radius:999px;font-size:12px;font-weight:500;letter-spacing:.05em;cursor:pointer;font-family:'DM Sans',sans-serif}
.btn-cta:hover{background:var(--ink-2)}

.wrap{padding:72px 20px 24px;max-width:1400px;margin:0 auto}
.engine-shell{display:grid;grid-template-columns:320px 1fr;gap:18px;min-height:calc(100vh - 92px)}
.panel{background:var(--white);border:1px solid var(--rule);border-radius:12px;box-shadow:0 12px 30px rgba(17,16,14,0.04)}
.side{padding:16px}
.side h1{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:500;margin-bottom:4px}
.side p{color:var(--muted);font-size:12.5px;line-height:1.7;margin-bottom:12px}
.module{display:flex;flex-direction:column;gap:6px;padding:12px;border-radius:10px;border:1px solid transparent;cursor:pointer;transition:all .15s}
.module:hover{border-color:var(--rule);background:var(--bark-ll)}
.module.active{border-color:var(--bark-l);background:var(--bark-ll)}
.module-title{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:600;letter-spacing:.05em;text-transform:uppercase}
.module-desc{font-size:12px;color:var(--muted);line-height:1.6}
.module-meta{font-size:10px;color:var(--muted-l);text-transform:uppercase;letter-spacing:.14em}
.frame-head{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:1px solid var(--rule);font-size:12px;color:var(--muted)}
.frame-head .title{font-weight:500;color:var(--ink)}
.frame-body{height:calc(100vh - 156px)}
.engine-frame{width:100%;height:100%;border:none;border-radius:0 0 12px 12px;background:var(--cream)}
.mobile-note{display:none}
@media(max-width:980px){
  .engine-shell{grid-template-columns:1fr}
  .frame-body{height:70vh}
}
</style>
</head>
<body>
<nav class="nav">
  <a class="nav-mark" href="index.html">Evercrafted</a>
  <div class="nav-sep"></div>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="apps.html">Apps</a>
    <a href="marketplace.html">Marketplace</a>
    <a href="how-it-works.html">How it works</a>
    <a href="pricing.html">Pricing</a>
  </div>
  <div class="nav-r">
    <a class="btn-ghost" href="signup.html">Sign in</a>
    <a class="btn-cta" href="waitlist.html">Start free trial</a>
  </div>
</nav>

<div class="wrap">
  <div class="engine-shell">
    <div class="panel side">
      <h1>Evercrafted Engine</h1>
      <p>This is the operational core. Every app, marketplace action, and blueprint workflow routes through these modules.</p>
      <div id="moduleList"></div>
    </div>
    <div class="panel">
      <div class="frame-head">
        <div class="title" id="frameTitle">Engine Module</div>
        <a id="openNew" class="btn-ghost" href="#" target="_blank" rel="noopener">Open in new tab</a>
      </div>
      <div class="frame-body">
        <iframe id="engineFrame" class="engine-frame" title="Evercrafted Engine"></iframe>
      </div>
    </div>
  </div>
</div>

<script>
const MODULES=[
  {id:'p1',title:'P1 Core Engine',meta:'Foundation',desc:'Formulas, emotion space, blueprint inspector, DNA registry.',src:'Apps/Evercrafted — System Console 1.html'},
  {id:'p2',title:'P2 Inventory Engine',meta:'Inventory',desc:'Inventory analyzer, feasibility scoring, stock inputs.',src:'Apps/Evercrafted — System Console 2.html'},
  {id:'p3',title:'P3 Blueprint Lab',meta:'Design',desc:'Adaptive Blueprint Composer, genome dashboard, output studio.',src:'Apps/Evercrafted — System Console 3.html'},
  {id:'p4',title:'P4 API + Schema',meta:'Integration',desc:'API center, schema registry, architecture map.',src:'Apps/Evercrafted — System Console 4.html'},
  {id:'p5',title:'P5 Memory Weaver',meta:'Emotion',desc:'Memory Weaver, Design Drop, response layer.',src:'Apps/Evercrafted — System Console 5.html'},
  {id:'p6',title:'P6 Inventory AI',meta:'Ops',desc:'Inventory AI, substitution, blueprint evaluation, build sheet.',src:'Apps/Evercrafted — System Console 6+7.html'},
  {id:'p7',title:'P7 Prompt Compiler',meta:'Compiler',desc:'Compile memory + inventory inputs into engine-ready prompts.',src:'Apps/evercrafted-prompt-compiler.html'},
  {id:'p8',title:'P8–P10 Operations',meta:'Orders',desc:'Order studio, tracker, analytics, integrations, Shopify.',src:'Apps/Evercrafted — System Console 8+9+10.html'}
];

const APP_TO_MODULE={
  'formula-registry':'p1',
  'memory-weaver':'p5',
  'emotionsync':'p1',
  'visual-companion':'p5',
  'visual-companion-pro':'p5',
  'layout-studio':'p3',
  'design-studio':'p3',
  'design-generator':'p1',
  'parametric-lab':'p3',
  'inventory-weaver':'p2',
  'design-optimizer':'p6',
  'structural-balance':'p6',
  'design-echo':'p3',
  'variant-branching':'p3',
  'fusion-engine':'p3',
  'design-intel-pro':'p6',
  'adaptive-composer':'p3',
  'client-portal':'p8',
  'prompt-compiler':'p7'
};

function getParam(key){
  const params=new URLSearchParams(window.location.search);
  return params.get(key);
}

function renderModules(activeId){
  const list=document.getElementById('moduleList');
  list.innerHTML=MODULES.map(m=>`
    <div class="module ${m.id===activeId?'active':''}" onclick="loadModule('${m.id}')">
      <div class="module-title">${m.title}</div>
      <div class="module-meta">${m.meta}</div>
      <div class="module-desc">${m.desc}</div>
    </div>
  `).join('');
}

function loadModule(id){
  const mod=MODULES.find(m=>m.id===id)||MODULES[0];
  document.getElementById('frameTitle').textContent=mod.title;
  const params=new URLSearchParams();
  params.set('v','light');
  const admin = new URLSearchParams(window.location.search).get('admin');
  if (admin === '1') params.set('admin','1');
  const src=encodeURI(mod.src + '?' + params.toString());
  document.getElementById('engineFrame').src=src;
  const openNew=document.getElementById('openNew');
  openNew.href=src;
  renderModules(mod.id);
}

const appKey=getParam('app');
const moduleParam=getParam('module');
const initial=APP_TO_MODULE[appKey]||moduleParam||'p1';
renderModules(initial);
loadModule(initial);
</script>
</body>
</html>
