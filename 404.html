<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found — Evercrafted</title>
  <style>
    :root {
      --cream: #F8F5EF;
      --ink: #1B1916;
      --muted: #8A8278;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      background: var(--cream);
      color: var(--ink);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 32px;
    }
    .card {
      max-width: 560px;
      width: 100%;
      background: #fff;
      border: 1px solid rgba(27, 25, 22, 0.1);
      border-radius: 12px;
      padding: 32px;
      text-align: center;
      box-shadow: 0 12px 30px rgba(27, 25, 22, 0.06);
    }
    h1 {
      font-size: 28px;
      margin-bottom: 12px;
      letter-spacing: -0.02em;
    }
    p {
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 24px;
    }
    a {
      display: inline-block;
      padding: 10px 18px;
      background: var(--ink);
      color: #fff;
      text-decoration: none;
      border-radius: 6px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Page not found</h1>
    <p>The page you are looking for doesn’t exist. Head back to the homepage to continue browsing.</p>
    <a href="index.html">Go to homepage</a>
  </div>
</body>
</html>
